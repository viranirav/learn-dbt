version: 2

seeds:
  - name: employees
    description: Raw employee records — single source of truth for all employees.
    columns:
      - name: employee_id
        data_type: integer
      - name: first_name
        data_type: varchar
      - name: last_name
        data_type: varchar
      - name: email
        data_type: varchar
      - name: phone_number
        data_type: varchar
      - name: hire_date
        data_type: date
      - name: job_id
        data_type: varchar
      - name: salary
        data_type: numeric
      - name: commission_pct
        data_type: numeric
      - name: manager_id
        data_type: integer
      - name: department_id
        data_type: integer
      - name: employment_type
        data_type: varchar
      - name: is_remote
        data_type: boolean

  - name: departments
    description: Department reference data.
    columns:
      - name: department_id
        data_type: integer
      - name: department_name
        data_type: varchar
      - name: location_id
        data_type: integer

  - name: jobs
    description: Job titles with salary bands.
    columns:
      - name: job_id
        data_type: varchar
      - name: job_title
        data_type: varchar
      - name: min_salary
        data_type: numeric
      - name: max_salary
        data_type: numeric

  - name: locations
    description: Office locations.
    columns:
      - name: location_id
        data_type: integer
      - name: street_address
        data_type: varchar
      - name: city
        data_type: varchar
      - name: state
        data_type: varchar
      - name: country
        data_type: varchar
